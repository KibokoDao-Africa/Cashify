name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hetzner Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USERNAME }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          port: 22
          script: |
            # Install Docker if not already installed
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              apt-get update
              apt-get install -y ca-certificates curl gnupg
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable docker
              systemctl start docker
            fi

            # Install Docker Compose if not already installed
            if ! command -v docker-compose &> /dev/null; then
              echo "Installing Docker Compose..."
              curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi

            # Install Git if not already installed
            if ! command -v git &> /dev/null; then
              echo "Installing Git..."
              apt-get update
              apt-get install -y git
            fi

            # Set up project directory
            PROJECT_DIR="/opt/cashify"
            mkdir -p $PROJECT_DIR

            # Clone or update repository
            if [ -d "$PROJECT_DIR/.git" ]; then
              echo "Updating existing repository..."
              cd $PROJECT_DIR
              git fetch origin
              git reset --hard origin/main
            else
              echo "Cloning repository..."
              cd /opt
              rm -rf cashify
              git clone https://github.com/KibokoDao-Africa/Cashify.git cashify
              cd $PROJECT_DIR
            fi

            # Create .env file if it doesn't exist
            if [ ! -f "$PROJECT_DIR/.env" ]; then
              echo "Creating .env file from .env.example..."
              cp .env.example .env
              echo "WARNING: Please update .env file with your actual credentials!"
            fi

            # Stop existing containers
            docker-compose down || true

            # Build and start containers
            docker-compose up -d --build

            # Wait for services to be ready
            echo "Waiting for services to start..."
            sleep 10

            # Show container status
            docker-compose ps

            # Clean up old images
            docker image prune -f

            echo "Deployment completed successfully!"

      - name: Deployment Status
        if: success()
        run: echo "Deployment to Hetzner completed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "Deployment failed. Check logs for details."
