# Nginx configuration for Cashify API with SSL
# This file should be placed in /etc/nginx/sites-available/cashify
# and symlinked to /etc/nginx/sites-enabled/

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 95.217.176.128 cashify.yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 95.217.176.128 cashify.yourdomain.com;

    # SSL Certificate Configuration
    # These paths will be created by certbot
    ssl_certificate /etc/letsencrypt/live/cashify.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cashify.yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cashify.yourdomain.com/chain.pem;

    # SSL Configuration - Modern security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL session configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/cashify-access.log;
    error_log /var/log/nginx/cashify-error.log;

    # Maximum file upload size (for media uploads)
    client_max_body_size 100M;

    # Proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_buffering off;

    # Proxy timeout settings (for long-running requests)
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # Root location - proxy to Flask application
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Swagger documentation location
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
    }

    # API spec location
    location /apispec.json {
        proxy_pass http://127.0.0.1:8000/apispec.json;
    }

    # Static files for Swagger UI
    location /flasgger_static {
        proxy_pass http://127.0.0.1:8000/flasgger_static;
    }

    # Health check endpoint (bypass proxy for faster response)
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8000/;
    }
}
